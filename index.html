<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GRASS CUTTER 2003</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100dvw;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
    }
    canvas { display: block; image-rendering: pixelated; }
    #game-container {
      position: fixed; inset: 0;
    }
    #mobile-bar {
      display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 600;
      background: rgba(0,0,0,0.88); padding: 6px 10px;
      font-family: 'Courier New', monospace; font-size: 13px; color: #ffcc00;
      pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #mobile-hud-strip {
      display: none; position: fixed; z-index: 500;
      left: 0; right: 0;
      background: rgba(0,0,0,0.80); padding: 5px 14px;
      font-family: 'Courier New', monospace; font-size: 12px;
      align-items: center; justify-content: space-between; gap: 10px;
      pointer-events: none;
    }
    #mhud-gasbar {
      display: inline-block; width: 56px; height: 7px;
      background: #222; border-radius: 4px; overflow: hidden;
      vertical-align: middle; margin-left: 4px;
    }
    #mhud-gasfill { height: 100%; width: 100%; background: #00cc44; }
    .mhud-lbl { color: #666; font-size: 10px; }
    .mhud-val { color: #ffcc00; }

    #spotify-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #0d2b0d 0%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      color: #fff;
    }
    #spotify-overlay.hidden { display: none; }
    .overlay-title {
      font-size: 60px; font-weight: bold; color: #ffcc00;
      text-shadow: 4px 4px 0 #000, -1px -1px 0 #000;
      letter-spacing: 4px; margin-bottom: 8px;
    }
    .overlay-sub { font-size: 16px; color: #8bc44a; letter-spacing: 3px; margin-bottom: 40px; }
    .overlay-box {
      background: rgba(0,0,0,0.7); border: 3px solid #1DB954;
      padding: 32px 48px; text-align: center; max-width: 480px;
    }
    .overlay-box p { font-size: 15px; line-height: 1.7; color: #ccc; margin-bottom: 28px; }
    .overlay-box p strong { color: #1DB954; }
    .btn-spotify {
      display: block; background: #1DB954; color: #000; border: 3px solid #000;
      box-shadow: 4px 4px 0 #000; padding: 14px 36px; font-size: 18px;
      font-family: 'Courier New', monospace; font-weight: bold;
      text-transform: uppercase; letter-spacing: 2px; cursor: pointer; width: 100%;
      transition: transform 0.1s, box-shadow 0.1s; margin-bottom: 12px;
    }
    .btn-spotify:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #000; }
    .btn-skip {
      background: transparent; color: #555; border: 2px solid #333;
      padding: 10px 24px; font-size: 13px; font-family: 'Courier New', monospace;
      cursor: pointer; width: 100%; transition: color 0.2s;
    }
    .btn-skip:hover { color: #888; }
    .overlay-note { margin-top: 24px; font-size: 11px; color: #444; text-align: center; }

    /* ── Mobile controls ─────────────────────────── */
    #ctrl-dir, #ctrl-actions {
      display: none;
      position: fixed;
      z-index: 500;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
    }
    #ctrl-dir {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      padding: 8px;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.38);
    }
    #ctrl-actions {
      flex-direction: column;
      gap: 10px;
    }
    .ctrl-key, .ctrl-action {
      appearance: none;
      -webkit-appearance: none;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.82);
      font-family: 'Courier New', monospace;
      font-weight: bold;
      line-height: 1;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
    }
    .ctrl-key {
      border-radius: 8px;
      font-size: 25px;
      min-width: 0;
      min-height: 0;
    }
    .ctrl-key[data-dir="0,-1"] { grid-column: 2; grid-row: 1; }
    .ctrl-key[data-dir="-1,0"] { grid-column: 1; grid-row: 2; }
    .ctrl-key[data-dir="1,0"]  { grid-column: 3; grid-row: 2; }
    .ctrl-key[data-dir="0,1"]  { grid-column: 2; grid-row: 3; }
    .ctrl-key.active {
      background: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.62);
      color: #ffffff;
    }
    .ctrl-action {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      border-radius: 8px;
      font-size: 28px;
    }
    .ctrl-action small {
      font-size: 11px;
      letter-spacing: 1px;
      pointer-events: none;
    }
    #ctrl-throttle {
      background: rgba(69,176,69,0.14);
      border-color: rgba(139,196,74,0.42);
      color: #8bc44a;
    }
    #ctrl-throttle.active {
      background: rgba(69,176,69,0.30);
      border-color: rgba(139,196,74,0.95);
      color: #ffffff;
    }
    #ctrl-dig {
      background: rgba(255,204,0,0.08);
      border-color: rgba(255,204,0,0.28);
      color: #ffcc00;
    }
    #ctrl-dig.active {
      background: rgba(255,204,0,0.22);
      border-color: rgba(255,204,0,0.82);
    }
    @media (pointer: coarse) {
      #back-btn {
        top: max(10px, env(safe-area-inset-top));
        right: max(10px, env(safe-area-inset-right));
        bottom: auto !important;
      }
    }
  </style>
</head>
<body>

  <div id="spotify-overlay">
    <div class="overlay-title">GRASS CUTTER</div>
    <div class="overlay-sub">✦ 2003 EDITION ✦</div>
    <div class="overlay-box">
      <p>
        Connect Spotify to blast <strong>For Cutting Grass</strong>
        while you mow.<br>Requires <strong>Spotify Premium</strong>.
      </p>
      <button class="btn-spotify" onclick="window.location.href='https://bandmusicgames.party'">
        ● Connect Spotify at Lobby
      </button>
      <button class="btn-skip" onclick="skipSpotify()">
        Play without music
      </button>
    </div>
    <div class="overlay-note">
      Need a Client ID? Set it in config.js after registering at developer.spotify.com
    </div>
  </div>

  <div id="mobile-bar"></div>
  <div id="mobile-hud-strip">
    <span><span class="mhud-lbl">GAS</span><span id="mhud-gasbar"><span id="mhud-gasfill"></span></span></span>
    <span><span class="mhud-lbl">CUT </span><span class="mhud-val" id="mhud-cut">0%</span></span>
    <span><span class="mhud-lbl">GOAL </span><span style="color:#aaa" id="mhud-goal">—</span></span>
    <span><span class="mhud-lbl">SCORE </span><span style="color:#fff" id="mhud-score">0</span></span>
  </div>
  <!-- Mobile controls -->
  <div id="ctrl-dir" aria-label="Direction controls">
    <button class="ctrl-key" data-dir="0,-1" aria-label="Up">&uarr;</button>
    <button class="ctrl-key" data-dir="-1,0" aria-label="Left">&larr;</button>
    <button class="ctrl-key" data-dir="1,0" aria-label="Right">&rarr;</button>
    <button class="ctrl-key" data-dir="0,1" aria-label="Down">&darr;</button>
  </div>
  <div id="ctrl-actions" aria-label="Action controls">
    <button id="ctrl-throttle" class="ctrl-action" aria-label="Throttle">
      &#9650;<small>GO</small>
    </button>
    <button id="ctrl-dig" class="ctrl-action" aria-label="Dig">
      &#9670;<small>DIG</small>
    </button>
  </div>

  <div id="game-container"></div>

  <script>
    window.onSpotifyWebPlaybackSDKReady = function () {
      window._sdkReady = true;
      if (window._onSDKReady) window._onSDKReady();
    };
    function skipSpotify() {
      document.getElementById('spotify-overlay').classList.add('hidden');
      window._gameReady = true;
    }
    function handleBack() {
      const gi = window._gameInstance;
      const inGame = gi && ['Game','LevelComplete','GameOver','Win'].some(k => gi.scene.isActive(k));
      if (inGame) {
        window._musicPlaying = false;
        if (window._spotifyConnected && window.SpotifyPlayer) SpotifyPlayer.pause();
        gi.scene.start('Menu');
      } else {
        window.location.href = 'https://bandmusicgames.party';
      }
    }

    const _isMobile = window.matchMedia('(pointer: coarse)').matches;

    // ── Mobile overlays ───────────────────────────────────────────
    const _mobileBar     = document.getElementById('mobile-bar');
    const _mobileHUDStrip = document.getElementById('mobile-hud-strip');
    if (_isMobile) _mobileBar.style.display = 'block';

    window._mobileSetBar = (text, color) => {
      _mobileBar.textContent = text;
      _mobileBar.style.color = color || '#ffcc00';
    };

    if (_isMobile) {
      window._mobileHUD = {
        gasfill: document.getElementById('mhud-gasfill'),
        cut:     document.getElementById('mhud-cut'),
        goal:    document.getElementById('mhud-goal'),
        score:   document.getElementById('mhud-score'),
        strip:   _mobileHUDStrip,
      };
    }

    // Request fullscreen on first touch — hides Safari tab bar in landscape
    if (_isMobile) {
      document.addEventListener('touchstart', function _tryFS() {
        const el = document.documentElement;
        (el.requestFullscreen || el.webkitRequestFullscreen || (() => {})).call(el);
        document.removeEventListener('touchstart', _tryFS);
      }, { once: true, passive: true });
    }

    // ── Controls layout ───────────────────────────────────────────
    function _checkOrientation() {
      if (!_isMobile) return;
      _positionControls();
    }

    function _hideControls() {
      document.getElementById('ctrl-dir').style.display = 'none';
      document.getElementById('ctrl-actions').style.display = 'none';
      document.getElementById('ctrl-dig').style.display = 'none';
    }

    function _positionControls() {
      if (!_isMobile) return;
      const scene = window._activeGameScene;
      if (!scene) { _hideControls(); return; }
      const portrait = window.innerHeight > window.innerWidth;
      const dir = document.getElementById('ctrl-dir');
      const actions = document.getElementById('ctrl-actions');
      const throttle = document.getElementById('ctrl-throttle');
      const dig = document.getElementById('ctrl-dig');
      const hasStumps = scene.cfg?.stumps > 0;

      if (portrait) {
        const PAD = 14;
        const safeBottom = 'max(14px, env(safe-area-inset-bottom))';
        const dirSize = Math.min(152, Math.floor(window.innerWidth * 0.42));
        const actionW = Math.min(138, Math.floor(window.innerWidth * 0.36));
        dir.style.cssText = `display:grid;left:${PAD}px;bottom:${safeBottom};width:${dirSize}px;height:${dirSize}px;`;
        actions.style.cssText = `display:flex;right:${PAD}px;bottom:${safeBottom};width:${actionW}px;`;
        throttle.style.cssText = `height:${hasStumps ? 86 : 116}px;`;
        if (hasStumps) {
          dig.style.display = 'flex';
          dig.style.height = '58px';
        } else {
          dig.style.display = 'none';
        }
        // Position HUD strip just below the canvas
        const canvas = document.querySelector('#game-container canvas');
        if (canvas && _mobileHUDStrip) {
          const r = canvas.getBoundingClientRect();
          _mobileHUDStrip.style.top = `${r.bottom + 4}px`;
        }
        return;
      }
      // Hide HUD strip in landscape (sidebar controls have the space)
      if (_mobileHUDStrip) _mobileHUDStrip.style.display = 'none';

      // Landscape: side bars flanking the canvas
      const canvas = document.querySelector('#game-container canvas');
      if (!canvas) { setTimeout(_positionControls, 200); return; }
      const rect   = canvas.getBoundingClientRect();
      const vw     = window.innerWidth;
      const vh     = window.innerHeight;
      const PAD    = 6;
      const leftW  = Math.floor(rect.left) - PAD;
      const rightW = Math.floor(vw - rect.right) - PAD;
      const zoneH  = vh - PAD * 2;

      if (leftW < 40) { _hideControls(); return; }
      const dirSize = Math.min(leftW, zoneH, 152);
      dir.style.cssText = `display:grid;left:${PAD}px;top:${Math.round((vh - dirSize) / 2)}px;width:${dirSize}px;height:${dirSize}px;`;
      if (rightW >= 40) {
        const actionW = Math.max(48, rightW);
        actions.style.cssText = `display:flex;right:${PAD}px;top:${PAD}px;width:${actionW}px;height:${zoneH}px;justify-content:center;`;
        throttle.style.cssText = `height:${hasStumps ? Math.max(76, Math.floor(zoneH * 0.52)) : Math.max(104, Math.floor(zoneH * 0.74))}px;`;
        if (hasStumps) {
          dig.style.display = 'flex';
          dig.style.height = Math.max(58, Math.floor(zoneH * 0.24)) + 'px';
        } else {
          dig.style.display = 'none';
        }
      } else {
        actions.style.display = 'none';
      }
    }
    window._positionMobileControls = _positionControls;

    window.addEventListener('resize', _checkOrientation);
    window.addEventListener('load', () => setTimeout(_checkOrientation, 600));
    setInterval(() => { if (_isMobile) _positionControls(); }, 1500);

    // ── Throttle + D-pad handling ─────────────────────────────────
    const dirButtons = Array.from(document.querySelectorAll('.ctrl-key'));
    const throttle = document.getElementById('ctrl-throttle');
    const dig = document.getElementById('ctrl-dig');
    const activeDirs = new Map();
    let throttleDown = false;
    let lastDir = { x: 0, y: -1 };
    function _scene() { return window._activeGameScene; }

    function _syncTouch() {
      const s = _scene();
      if (!s) return;
      let dx = 0;
      let dy = 0;
      for (const v of activeDirs.values()) {
        dx += v.x;
        dy += v.y;
      }
      if (dx !== 0 || dy !== 0) {
        lastDir = { x: Math.sign(dx), y: Math.sign(dy) };
      } else if (throttleDown) {
        dx = lastDir.x;
        dy = lastDir.y;
      }
      s._touch.active = throttleDown || activeDirs.size > 0;
      s._touch.throttle = throttleDown;
      s._touch.dx = dx;
      s._touch.dy = dy;
    }

    function _bindHold(el, onDown, onUp) {
      const release = e => {
        e.preventDefault();
        onUp(e);
        try { el.releasePointerCapture(e.pointerId); } catch (_) {}
      };
      el.addEventListener('pointerdown', e => {
        e.preventDefault();
        try { el.setPointerCapture(e.pointerId); } catch (_) {}
        onDown(e);
      });
      el.addEventListener('pointerup', release);
      el.addEventListener('pointercancel', release);
      el.addEventListener('lostpointercapture', e => onUp(e));
    }

    window._resetMobileControls = () => {
      activeDirs.clear();
      throttleDown = false;
      dirButtons.forEach(btn => btn.classList.remove('active'));
      throttle.classList.remove('active');
      dig.classList.remove('active');
      const s = _scene();
      if (s) {
        s._touch.active = false;
        s._touch.throttle = false;
        s._touch.dx = 0;
        s._touch.dy = 0;
        s._touch.digging = false;
      }
    };

    dirButtons.forEach(btn => {
      const [x, y] = btn.dataset.dir.split(',').map(Number);
      _bindHold(btn, e => {
        activeDirs.set(e.pointerId, { x, y });
        btn.classList.add('active');
        _syncTouch();
      }, e => {
        activeDirs.delete(e.pointerId);
        btn.classList.remove('active');
        _syncTouch();
      });
    });

    _bindHold(throttle, () => {
      throttleDown = true;
      throttle.classList.add('active');
      _syncTouch();
    }, () => {
      throttleDown = false;
      throttle.classList.remove('active');
      _syncTouch();
    });

    _bindHold(dig, () => {
      dig.classList.add('active');
      const s = _scene(); if (s) s._touch.digging = true;
    }, () => {
      dig.classList.remove('active');
      const s = _scene(); if (s) s._touch.digging = false;
    });

  </script>

  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="config.js"></script>
  <script src="js/spotify.js"></script>
  <script src="js/game.js"></script>

  <button id="back-btn" style="position:fixed;bottom:16px;right:16px;z-index:9999;padding:8px 18px;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;border:none;border-radius:20px;font-size:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:700;letter-spacing:0.1em;cursor:pointer;box-shadow:0 4px 12px rgba(168,85,247,0.4);touch-action:manipulation;">&#8592; Back</button>
  <script>
    document.getElementById('back-btn').addEventListener('pointerdown', function(e) {
      e.preventDefault();
      e.stopPropagation();
      handleBack();
    });

    // Shake to go back (same as back button)
    if (window.DeviceMotionEvent) {
      let _lastShake = 0;
      window.addEventListener('devicemotion', function(e) {
        const acc = e.accelerationIncludingGravity;
        if (!acc) return;
        const mag = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
        const now = Date.now();
        if (mag > 20 && now - _lastShake > 1500) {
          _lastShake = now;
          handleBack();
        }
      });
    }
  </script>
</body>
</html>
